name: Deploy Frontend to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: caesaraiapis
  SERVICE_NAME: proofofresolution-frontend
  REGION: us-central1
  IMAGE_NAME: proofofresolution-frontend
  REACT_APP_API_BASE: https://proofofresolution-662756251108.us-central1.run.app

jobs:
  deploy:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker client
        run: |
          gcloud auth configure-docker --quiet

      - name: Build Docker Image
        run: |
          docker build --progress=plain \
            --build-arg REACT_APP_API_BASE=${{ env.REACT_APP_API_BASE }} \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker Image
        run: |
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated --port=80'
