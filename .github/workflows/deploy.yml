name: Deploy Frontend to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: caesaraiapis
  SERVICE_NAME: proofofresolution-frontend
  REGION: us-central1
  IMAGE_NAME: proofofresolution-frontend
  REACT_APP_API_BASE: https://proofofresolution-662756251108.us-central1.run.app

jobs:
  deploy:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker client
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          API_BASE="${{ secrets.REACT_APP_API_BASE }}"
          if [ -z "$API_BASE" ]; then
            API_BASE="${{ env.REACT_APP_API_BASE }}"
          fi
          docker build --progress=plain \
            --build-arg REACT_APP_API_BASE="$API_BASE" \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/caesaraiapis/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/caesaraiapis/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker Image
        run: |
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/caesaraiapis/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/caesaraiapis/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/caesaraiapis/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated --port=80'
          env_vars: |
            REACT_APP_API_BASE=${{ secrets.REACT_APP_API_BASE }}
